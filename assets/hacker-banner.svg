<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#001a00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="0" y="0" width="900" height="260" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="260" fill="url(#bgGrad)"/>

    <!-- Matrix falling code columns -->
    <g font-family="Consolas, monospace" font-size="16" fill="#00ff41" opacity="0.55">
      <text x="10" y="0"><animate attributeName="y" from="-260" to="260" dur="2.3s" repeatCount="indefinite"/>ﾊ1ﾐ0ｦｹｰ1ｳｼﾀ0</text>
      <text x="35" y="0"><animate attributeName="y" from="-260" to="260" dur="3.1s" begin="0.3s" repeatCount="indefinite"/>01ｱｳｴ0ｶｷｸ1</text>
      <text x="60" y="0"><animate attributeName="y" from="-260" to="260" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>ｹｺｻｼｽ1ｾｿ0</text>
      <text x="85" y="0"><animate attributeName="y" from="-260" to="260" dur="2.6s" begin="0.1s" repeatCount="indefinite"/>110ﾀﾁﾂ0ﾃﾄ1</text>
      <text x="110" y="0"><animate attributeName="y" from="-260" to="260" dur="2.0s" begin="0.9s" repeatCount="indefinite"/>ｦｧｨ1ｩｪｫ0</text>
      <text x="135" y="0"><animate attributeName="y" from="-260" to="260" dur="3.4s" begin="0.4s" repeatCount="indefinite"/>0ﾅﾆﾇ1ﾈﾉ0ﾊ</text>
      <text x="160" y="0"><animate attributeName="y" from="-260" to="260" dur="1.6s" begin="1.2s" repeatCount="indefinite"/>1ﾋﾌ0ﾍﾎﾏ1</text>
      <text x="185" y="0"><animate attributeName="y" from="-260" to="260" dur="2.9s" begin="0.7s" repeatCount="indefinite"/>ﾐﾑﾒ0ﾓﾔ1ﾕ</text>
      <text x="740" y="0"><animate attributeName="y" from="-260" to="260" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>ﾖﾗﾘ1ﾙﾚﾛ0</text>
      <text x="765" y="0"><animate attributeName="y" from="-260" to="260" dur="1.9s" begin="1.0s" repeatCount="indefinite"/>0ﾜｦﾝ1010</text>
      <text x="790" y="0"><animate attributeName="y" from="-260" to="260" dur="3.0s" begin="0.2s" repeatCount="indefinite"/>1ｱｳｴｵ0ｶｷ</text>
      <text x="815" y="0"><animate attributeName="y" from="-260" to="260" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>ｸｹｺ1ｻｼｽ0</text>
      <text x="840" y="0"><animate attributeName="y" from="-260" to="260" dur="2.7s" begin="0.3s" repeatCount="indefinite"/>0ｾｿﾀ1ﾁﾂ0</text>
      <text x="865" y="0"><animate attributeName="y" from="-260" to="260" dur="1.7s" begin="1.1s" repeatCount="indefinite"/>1ﾃﾄﾅ0ﾆﾇ1</text>
    </g>

    <!-- subtle scanline -->
    <rect x="0" y="0" width="900" height="4" fill="#00ff41" opacity="0.15">
      <animate attributeName="y" from="0" to="260" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Terminal window bar -->
    <rect x="150" y="70" width="600" height="120" rx="8" fill="#0a0a0a" stroke="#00ff41" stroke-width="1.5" opacity="0.85"/>
    <circle cx="170" cy="86" r="5" fill="#ff5f56"/>
    <circle cx="188" cy="86" r="5" fill="#ffbd2e"/>
    <circle cx="206" cy="86" r="5" fill="#27c93f"/>

    <!-- Terminal text: name typing effect -->
    <text x="175" y="125" font-family="Consolas, monospace" font-size="15" fill="#00ff41" opacity="0.8">guest@root:~$ whoami</text>
    <text x="175" y="160" font-family="Consolas, monospace" font-size="26" font-weight="bold" fill="#00ff41" filter="url(#glow)">
      Rahul_Kumar_Patel
      <animate attributeName="opacity" values="1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
    </text>
    <rect x="480" y="145" width="12" height="20" fill="#00ff41">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <text x="175" y="185" font-family="Consolas, monospace" font-size="14" fill="#00ff41" opacity="0.7">&gt; Full Stack Developer | AI/ML Enthusiast | B.Tech IT</text>
  </g>
</svg>
